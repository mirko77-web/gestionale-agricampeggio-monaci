<svg width="160" height="110" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">

  <!-- Fumo animato -->
  <circle cx="20" cy="75" r="6" fill="#d1d5db">
    <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" />
    <animate attributeName="cy" values="75;65;75" dur="1.8s" repeatCount="indefinite" />
    <animate attributeName="r" values="4;7;4" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <circle cx="28" cy="78" r="4" fill="#e5e7eb">
    <animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite" />
    <animate attributeName="cy" values="78;70;78" dur="1.6s" repeatCount="indefinite" />
    <animate attributeName="r" values="3;6;3" dur="1.6s" repeatCount="indefinite" />
  </circle>

  <!-- Corpo -->
  <rect x="20" y="35" rx="10" ry="10" width="120" height="45" fill="#ffffff" stroke="#111827" stroke-width="2"/>
  
  <!-- Cabina -->
  <rect x="90" y="25" rx="8" ry="8" width="50" height="30" fill="#e5e7eb" stroke="#111827" stroke-width="2"/>

  <!-- Finestra cabina -->
  <rect x="98" y="30" width="22" height="16" rx="3" ry="3" fill="#bfdbfe" stroke="#111827" stroke-width="1.5"/>

  <!-- Finestra centrale -->
  <rect x="32" y="42" width="26" height="16" rx="3" ry="3" fill="#bfdbfe" stroke="#111827" stroke-width="1.5"/>

  <!-- Porta -->
  <rect x="64" y="40" width="18" height="28" rx="3" ry="3" fill="#f9fafb" stroke="#111827" stroke-width="1.5"/>

  <!-- Maniglia -->
  <circle cx="79" cy="54" r="1.8" fill="#111827"/>

  <!-- Linea decorativa -->
  <rect x="26" y="60" width="108" height="3" fill="#3b82f6" opacity="0.9"/>

  <!-- Ruote -->
  <circle cx="45" cy="82" r="10" fill="#111827"/>
  <circle cx="45" cy="82" r="5" fill="#e5e7eb"/>

  <circle cx="115" cy="82" r="10" fill="#111827"/>
  <circle cx="115" cy="82" r="5" fill="#e5e7eb"/>

  <!-- Ombra -->
  <ellipse cx="80" cy="92" rx="55" ry="6" fill="#000000" opacity="0.08"/>
</svg>
